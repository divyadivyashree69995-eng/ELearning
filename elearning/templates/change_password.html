<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — EduNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#08081a;--panel:#0e0e24;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.07);--accent:#7c6aff;--accent2:#e040c8;--text:#eeeeff;--muted:#7070a0}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:400px}
        h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:24px;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .msg{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px}
        .msg.err{background:rgba(239,68,68,.1);color:#ff8080}
        .msg.ok{background:rgba(0,212,170,.1);color:#00d4aa}
        label{display:block;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
        input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px;font-family:'DM Sans',sans-serif}
        input:focus{border-color:var(--accent)}
        .btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:white;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
        .btn:hover{opacity:.9}
        a{display:block;text-align:center;margin-top:16px;color:var(--accent);text-decoration:none;font-size:13px}
    </style>
</head>
<body>
<div class="card">
    <h2>Change Password</h2>
    {% if message %}
    <div class="msg {% if 'successfully' in message %}ok{% else %}err{% endif %}">{{ message }}</div>
    {% endif %}
    <form method="POST">
        <label>Current Password</label>
        <input type="password" name="current_password" required>
        <label>New Password</label>
        <input type="password" name="new_password" required minlength="6">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required minlength="6">
        <button type="submit" class="btn">Update Password</button>
    </form>
    <a href="/">← Back to Dashboard</a>
</div>
</body>
</html>
